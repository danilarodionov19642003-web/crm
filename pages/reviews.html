<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Отзывы — Mentori CRM</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <style>
    .rv-card { background: var(--panel); border:1px solid var(--border); border-radius:14px; padding:14px 16px; margin-bottom:12px; }
    .rv-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
    .rv-head .badge { font-size:11px; }
    .rv-text { white-space:pre-wrap; font-size:14px; line-height:1.5; padding:10px 12px; border-radius:8px; background:rgba(255,255,255,0.02); border:1px solid var(--border); }
    .rv-meta { font-size:12px; color:var(--text-mute); margin-top:8px; display:flex; gap:14px; flex-wrap:wrap; }
    .rv-actions { display:flex; gap:8px; margin-top:10px; }
    .rv-empty { text-align:center; padding:40px; color:var(--text-mute); }
  </style>
</head>
<body>
  <div class="app">
    <div data-component="sidebar" data-active="reviews"></div>

    <div class="main">
      <div data-component="header" data-title="Отзывы"></div>

      <main class="content">
        <div class="page-title">
          <div>
            <h1 id="pgTitle">Модерация отзывов</h1>
            <p id="pgSubtitle">Сотрудники сдают отзывы — здесь они одобряются и засчитываются в зарплату.</p>
          </div>
        </div>

        <section class="cards" id="rKpis"></section>

        <div class="filters">
          <select id="fStatus" class="select">
            <option value="pending">На модерации</option>
            <option value="approved">Одобренные</option>
            <option value="rejected">Отклонённые</option>
            <option value="">Все</option>
          </select>
          <select id="fAuthor" class="select">
            <option value="">Все сотрудники</option>
          </select>
          <select id="fPeriod" class="select">
            <option value="">Всё время</option>
            <option value="today">Сегодня</option>
            <option value="week" selected>Эта неделя</option>
            <option value="month">Этот месяц</option>
          </select>
          <input type="text" id="fSearch" class="input" placeholder="Поиск по тексту, аккаунту, клиенту..." style="flex:1;min-width:200px"/>
        </div>

        <div id="rList"><div class="rv-empty">Загружаем…</div></div>
      </main>
    </div>
  </div>

  <script src="../data/seed.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth-gate.js"></script>
  <script src="../js/cloud-sync.js"></script>
  <script src="../js/reviews-sync.js"></script>
  <script src="../components/sidebar.js"></script>
  <script src="../components/header.js"></script>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const { Store, fmtDate, toast } = window.App;
    Store.load();

    const role = (document.documentElement.dataset.role || 'owner').toLowerCase();
    const myEmail = (document.documentElement.dataset.userEmail || '').toLowerCase();
    const isOwner = role === 'owner';
    const RATE_DEFAULT = 300;

    if (!isOwner) {
      document.getElementById('pgTitle').textContent = 'Мои отзывы';
      document.getElementById('pgSubtitle').textContent = 'Здесь видны отзывы, которые ты сдала на модерацию. Одобренные засчитываются в зарплату.';
    }

    const filters = { status: 'pending', author: '', period: 'week', q: '' };

    function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function getProfile(id) {
      return (Store.state.profiles || []).find(p => p.id === id)
          || (Store.state.archivedProfiles || []).find(p => p.id === id);
    }
    function getMentor(id) {
      return (Store.state.mentors || []).find(m => m.id === id);
    }
    function periodStart(p) {
      const now = new Date();
      if (p === 'today')  { now.setHours(0,0,0,0); return now; }
      if (p === 'week')   { const d = new Date(now); const dow = (d.getDay()+6)%7; d.setDate(d.getDate()-dow); d.setHours(0,0,0,0); return d; }
      if (p === 'month')  { return new Date(now.getFullYear(), now.getMonth(), 1); }
      return null;
    }

    function refreshFilterOptions() {
      const sel = document.getElementById('fAuthor');
      if (!isOwner) { sel.style.display = 'none'; return; }
      const emails = Array.from(new Set((Store.state.reviews || []).map(r => (r.authorEmail || '').toLowerCase()).filter(Boolean))).sort();
      const cur = sel.value;
      sel.innerHTML = '<option value="">Все сотрудники</option>' +
        emails.map(e => `<option value="${escapeHtml(e)}">${escapeHtml(e)}</option>`).join('');
      sel.value = cur;
    }

    function getRows() {
      const start = periodStart(filters.period);
      let arr = (Store.state.reviews || []).slice();
      if (!isOwner) {
        // Настя видит только свои отзывы
        arr = arr.filter(r => (r.authorEmail || '').toLowerCase() === myEmail);
      } else if (filters.author) {
        arr = arr.filter(r => (r.authorEmail || '').toLowerCase() === filters.author);
      }
      if (filters.status) arr = arr.filter(r => r.moderation === filters.status);
      if (start) arr = arr.filter(r => new Date(r.submittedAt) >= start);
      if (filters.q) {
        const q = filters.q;
        arr = arr.filter(r => {
          const p = getProfile(r.profileId);
          const m = getMentor(r.mentorId);
          const s = ((r.text || '') + ' ' + (p?.code || '') + ' ' + (m?.code || '') + ' ' + (m?.name || '') + ' ' + (r.authorEmail || '')).toLowerCase();
          return s.includes(q);
        });
      }
      arr.sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));
      return arr;
    }

    /** Вернуть email сотрудника, которому начисляется зарплата за этот отзыв,
     *  либо null если клиент ведёт владелец / нет активного «Готов» статуса. */
    const DONE_STATUS_X = '🎯 Готов';
    function getReviewCreditEmail(r) {
      const st = (Store.state.profileStatuses || []).find(s =>
        s.mentorId === r.mentorId && s.profileId === r.profileId);
      if (!st || st.status !== DONE_STATUS_X) return null;
      const m = (Store.state.mentors || []).find(x => x.id === r.mentorId);
      if (!m) return null;
      const code = String(m.code || '').toLowerCase().trim();
      const c = (Store.state.clients || []).find(x =>
        String(x.code || '').toLowerCase().trim() === code);
      if (!c) return null;
      const e = String(c.assignedEmail || '').toLowerCase().trim();
      return e || null;
    }

    function renderKPIs() {
      const all = (Store.state.reviews || []);
      const start = periodStart(filters.period);
      const inPeriod = (r) => !start || new Date(r.submittedAt) >= start;
      let scope = all;
      if (!isOwner) scope = scope.filter(r => (r.authorEmail || '').toLowerCase() === myEmail);
      else if (filters.author) scope = scope.filter(r => (r.authorEmail || '').toLowerCase() === filters.author);
      const inP = scope.filter(inPeriod);

      const pending = inP.filter(r => r.moderation === 'pending').length;
      const approved = inP.filter(r => r.moderation === 'approved');
      const rejected = inP.filter(r => r.moderation === 'rejected').length;
      // «Заработано / К выплате» учитывает менеджера клиента: если клиент
      // ведёт владелец — отзыв в зп не идёт, а просто проходит модерацию.
      const creditMatches = (r) => {
        const credit = getReviewCreditEmail(r);
        if (!credit) return false;
        if (isOwner) return true;          // владелец видит сумму ко всем сотрудникам
        return credit === myEmail;          // сотрудник видит только свои
      };
      const earned = approved.filter(creditMatches)
        .reduce((s,r) => s + (Number(r.rate) || RATE_DEFAULT), 0);
      const potential = inP.filter(r => r.moderation === 'pending')
        .filter(r => {
          // прогноз для Насти — считаем по client.assignedEmail тоже
          const m = (Store.state.mentors || []).find(x => x.id === r.mentorId);
          if (!m) return false;
          const code = String(m.code||'').toLowerCase().trim();
          const c = (Store.state.clients || []).find(x => String(x.code||'').toLowerCase().trim() === code);
          if (!c) return false;
          const e = String(c.assignedEmail||'').toLowerCase().trim();
          if (!e) return false;
          return isOwner ? true : e === myEmail;
        })
        .reduce((s,r) => s + (Number(r.rate) || RATE_DEFAULT), 0);

      const periodLabel = filters.period === 'today' ? 'сегодня' : filters.period === 'week' ? 'неделя' : filters.period === 'month' ? 'месяц' : 'всё время';

      const kpis = isOwner ? [
        { label: `На модерации (${periodLabel})`, val: pending, color: 'var(--orange)' },
        { label: `Одобрено (${periodLabel})`,     val: approved.length, color: 'var(--green)' },
        { label: `Отклонено (${periodLabel})`,    val: rejected, color: 'var(--text-mute)' },
        { label: `К выплате (${periodLabel})`,    val: earned.toLocaleString('ru-RU') + ' ₽', color: 'var(--accent)' },
      ] : [
        { label: `На модерации (${periodLabel})`, val: pending, color: 'var(--orange)' },
        { label: `Одобрено (${periodLabel})`,     val: approved.length, color: 'var(--green)' },
        { label: `Заработано (${periodLabel})`,   val: earned.toLocaleString('ru-RU') + ' ₽', color: 'var(--accent)' },
        { label: `В ожидании одобрения`,          val: potential.toLocaleString('ru-RU') + ' ₽', color: 'var(--text-mute)' },
      ];
      document.getElementById('rKpis').innerHTML = kpis.map(k => `
        <article class="card"><div class="card__label">${k.label}</div><div class="card__value" style="color:${k.color}">${k.val}</div></article>
      `).join('');
    }

    function moderationBadge(m) {
      if (m === 'approved') return `<span class="badge badge--green"><span class="dot"></span>Одобрен</span>`;
      if (m === 'rejected') return `<span class="badge badge--red"><span class="dot"></span>Отклонён</span>`;
      return `<span class="badge badge--orange"><span class="dot"></span>На модерации</span>`;
    }

    function render() {
      renderKPIs();
      refreshFilterOptions();
      const rows = getRows();
      const list = document.getElementById('rList');
      if (!rows.length) {
        list.innerHTML = `<div class="rv-empty">Под фильтр ничего не попало.</div>`;
        return;
      }
      list.innerHTML = rows.map(r => {
        const p = getProfile(r.profileId);
        const m = getMentor(r.mentorId);
        const accLabel = p
          ? `<span class="badge badge--gray">${escapeHtml(p.code || '—')}</span>${p.archived ? ' <span class="badge badge--red">🗑 удалён</span>' : ''}`
          : `<span style="color:var(--text-mute)">— анкета удалена —</span>`;
        const menLabel = m
          ? `<span class="badge badge--gray">${escapeHtml(m.code || '—')}</span> ${escapeHtml(m.name || '')}`
          : `<span style="color:var(--text-mute)">— клиент удалён —</span>`;
        // Кому засчитывается зп (если этот отзыв одобрят и есть статус «Готов»).
        // Показываем только владельцу — Насте видеть кто именно получит не критично.
        let creditLabel = '';
        if (isOwner) {
          const credit = getReviewCreditEmail(r);
          if (credit) {
            const emp = (Store.state.employees || []).find(e => (e.email || '').toLowerCase().trim() === credit);
            const name = emp ? (emp.name || credit) : credit;
            creditLabel = `<span title="Менеджер клиента — ему идёт зп">💰 ${escapeHtml(name)}</span>`;
          } else {
            creditLabel = `<span title="Я веду этого клиента сам — зп никому" style="color:var(--text-mute)">💼 веду сам</span>`;
          }
        }
        const actions = (isOwner && r.moderation === 'pending') ? `
          <div class="rv-actions">
            <button class="btn btn--primary btn--sm" data-act="approve" data-id="${r.id}">✅ Одобрить (${(Number(r.rate)||RATE_DEFAULT)} ₽)</button>
            <button class="btn btn--ghost btn--sm" data-act="reject" data-id="${r.id}" style="color:var(--red)">✖ Отклонить</button>
          </div>` : '';
        const ownerExtra = (isOwner && r.moderation !== 'pending') ? `
          <div class="rv-actions">
            <button class="btn btn--ghost btn--sm" data-act="reopen" data-id="${r.id}">↺ Вернуть на модерацию</button>
            <button class="btn btn--ghost btn--sm" data-act="del"    data-id="${r.id}" style="color:var(--red)">🗑 Удалить</button>
          </div>` : '';
        return `
          <article class="rv-card">
            <div class="rv-head">
              ${accLabel}
              <span style="opacity:.6">×</span>
              ${menLabel}
              <div style="flex:1"></div>
              ${moderationBadge(r.moderation)}
            </div>
            <div class="rv-text">${escapeHtml(r.text || '')}</div>
            <div class="rv-meta">
              <span>👤 ${escapeHtml(r.authorEmail || '—')}</span>
              <span>📅 Сдан: ${escapeHtml(fmtDate(r.submittedAt))}</span>
              ${r.moderatedAt ? `<span>✅ Проверен: ${escapeHtml(fmtDate(r.moderatedAt))}${r.moderatedBy ? ' · ' + escapeHtml(r.moderatedBy) : ''}</span>` : ''}
              <span>💵 Ставка: ${Number(r.rate) || RATE_DEFAULT} ₽</span>
              ${creditLabel}
            </div>
            ${actions}${ownerExtra}
          </article>`;
      }).join('');

      list.querySelectorAll('button[data-act]').forEach(btn => {
        btn.addEventListener('click', () => act(btn.dataset.act, btn.dataset.id));
      });
    }

    function act(action, id) {
      const r = (Store.state.reviews || []).find(x => x.id === id);
      if (!r) return;
      if (action === 'approve') {
        Store.approveReview(id, myEmail);
        toast('Отзыв одобрен — зарплата засчитана');
      } else if (action === 'reject') {
        const reason = window.prompt('Причина отклонения (необязательно):', '');
        if (reason === null) return;
        Store.rejectReview(id, myEmail, reason || '');
        toast('Отзыв отклонён');
      } else if (action === 'reopen') {
        if (!confirm('Вернуть отзыв на модерацию? Зарплата по нему отзовётся.')) return;
        r.moderation = 'pending';
        r.moderatedAt = null; r.moderatedBy = null;
        Store.save();
        toast('Возвращён на модерацию');
      } else if (action === 'del') {
        if (!confirm('Удалить отзыв навсегда? Это действие нельзя отменить.')) return;
        Store.deleteReview(id);
        toast('Удалён');
      }
      // Пересчитать зарплату/счётчики у сотрудника прямо сейчас
      // (иначе придётся ждать тика setInterval / обновления страницы).
      if (window.ReviewsSync && window.ReviewsSync.recompute) window.ReviewsSync.recompute();
      render();
    }

    document.getElementById('fStatus').addEventListener('change',  e => { filters.status = e.target.value; render(); });
    document.getElementById('fAuthor').addEventListener('change',  e => { filters.author = e.target.value; render(); });
    document.getElementById('fPeriod').addEventListener('change',  e => { filters.period = e.target.value; render(); });
    document.getElementById('fSearch').addEventListener('input',   e => { filters.q = e.target.value.trim().toLowerCase(); render(); });
    window.onGlobalSearch = q => { filters.q = q; document.getElementById('fSearch').value = q; render(); };

    window.addEventListener('cloudstate:updated', () => { Store.load(); render(); });

    render();
  });
  </script>
</body>
</html>
