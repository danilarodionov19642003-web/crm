<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Личный кабинет — Mentori</title>
  <link rel="stylesheet" href="../../css/styles.css"/>
  <link rel="stylesheet" href="client.css"/>
</head>
<body class="cli-body">
  <div data-cli-header></div>

  <main class="cli-main">
    <h2 class="cli-section-title">Сводка</h2>
    <div class="cli-kpis" data-cli-totals></div>

    <h2 class="cli-section-title">Анкеты</h2>
    <div class="cli-list" data-cli-anketas>
      <div class="cli-empty">Загрузка…</div>
    </div>

    <h2 class="cli-section-title">Последние действия</h2>
    <div class="cli-feed" data-cli-feed></div>
  </main>

  <script src="../../js/supabase-client.js"></script>
  <script src="./client-app.js"></script>
  <script>
  (async () => {
    const ok = await window.ClientApp.requireLogin();
    if (!ok) return;
    const snap = await window.ClientApp.loadSnapshot();
    window.ClientApp.renderHeader(snap);
    if (!snap || !snap.payload) {
      document.querySelector('[data-cli-anketas]').innerHTML =
        '<div class="cli-empty">Данные ещё не загружены. Зайдите чуть позже или свяжитесь с менеджером.</div>';
      document.querySelector('[data-cli-totals]').innerHTML = '';
      document.querySelector('[data-cli-feed]').innerHTML = '';
      return;
    }
    window.ClientApp.renderTotals(snap.payload.totals);
    window.ClientApp.renderAnketas(snap.payload.anketas);
    window.ClientApp.renderFeed(snap.payload.feed);
  })();
  </script>
</body>
</html>
