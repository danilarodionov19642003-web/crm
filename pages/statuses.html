<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Статусы — Mentori CRM</title>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
  <div class="app">
    <div data-component="sidebar" data-active="statuses"></div>

    <div class="main">
      <div data-component="header" data-title="Статусы"></div>

      <main class="content">
        <div class="page-title">
          <div>
            <h1>Статусы клиентов на аккаунтах</h1>
            <p>Каждая пара «клиент × аккаунт» имеет один из шести статусов. История переходов сохраняется автоматически.</p>
          </div>
          <button class="btn btn--primary" id="btnAdd">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Поставить статус
          </button>
        </div>

        <section class="cards" id="stKpis"></section>

        <div class="filters">
          <select id="fStatus" class="select" style="min-width:180px"><option value="">Все статусы</option></select>
          <select id="fMentor" class="select" style="min-width:180px"><option value="">Все клиенты</option></select>
          <select id="fProfile" class="select" style="min-width:160px"><option value="">Все аккаунты</option></select>
          <input type="text" id="fSearch" class="input" placeholder="Поиск..." style="flex:1;min-width:160px"/>
          <button class="btn btn--ghost" id="btnReset">Сбросить</button>
        </div>

        <div class="panel">
          <div class="table-wrap">
            <table class="table" id="stTable">
              <thead>
                <tr>
                  <th>Аккаунт</th>
                  <th>Клиент</th>
                  <th>Статус</th>
                  <th>Дата</th>
                  <th>Комментарий</th>
                  <th class="num">История</th>
                  <th class="actions"></th>
                </tr>
              </thead>
              <tbody id="stRows"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Модалка статуса -->
  <div class="modal-backdrop" id="addModal">
    <div class="modal" style="max-width:520px">
      <div class="modal__header">
        <h3 id="modalTitle">Поставить статус</h3>
        <button class="btn--icon" data-close>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body">
        <div class="field-row">
          <div class="field">
            <label for="mProfile">Аккаунт</label>
            <select id="mProfile" class="select"></select>
          </div>
          <div class="field">
            <label for="mMentor">Клиент</label>
            <select id="mMentor" class="select"></select>
          </div>
        </div>
        <div class="field" style="margin-top:12px">
          <label for="mStatus">Статус</label>
          <select id="mStatus" class="select"></select>
        </div>
        <div class="field" style="margin-top:12px">
          <label for="mComment">Комментарий</label>
          <input type="text" id="mComment" class="input"/>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" data-close>Отмена</button>
        <button class="btn btn--primary" id="mSave">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Модалка истории -->
  <div class="modal-backdrop" id="histModal">
    <div class="modal" style="max-width:520px">
      <div class="modal__header">
        <h3 id="histTitle">История статусов</h3>
        <button class="btn--icon" data-close>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body" id="histBody"></div>
      <div class="modal__footer">
        <button class="btn btn--ghost" data-close>Закрыть</button>
      </div>
    </div>
  </div>

  <script src="../data/seed.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/cloud-sync.js"></script>
  <script src="../js/accounts-sync.js"></script>
  <script src="../js/reviews-sync.js"></script>
  <script src="../components/sidebar.js"></script>
  <script src="../components/header.js"></script>
  <script src="../components/table.js"></script>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const { Store, Modal, toast, fmtDate, PROFILE_STATUSES } = window.App;
    const { confirmDelete } = window.TableUtils;

    Store.load();
    const filters = { status: '', mentorId: '', profileId: '', q: '' };

    function profileById(id) { return Store.state.profiles.find(p => p.id === id); }
    function mentorById(id) { return Store.state.mentors.find(m => m.id === id); }
    function profileLabel(p) { return p ? `${p.code || '—'} · ${p.city || ''}` : '—'; }
    function mentorLabel(m) { return m ? `${m.code || '—'} · ${m.name || ''}` : '—'; }

    function fillSelects() {
      const fs = document.getElementById('fStatus');
      fs.innerHTML = '<option value="">Все статусы</option>' +
        PROFILE_STATUSES.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
      const fm = document.getElementById('fMentor');
      const ms = (Store.state.mentors || []).slice().sort((a,b) => (a.code || '').localeCompare(b.code || '', 'ru', {numeric:true}));
      fm.innerHTML = '<option value="">Все клиенты</option>' + ms.map(m => `<option value="${m.id}">${escapeHtml(mentorLabel(m))}</option>`).join('');
      const fp = document.getElementById('fProfile');
      const ps = (Store.state.profiles || []).slice().sort((a,b) => (a.code || '').localeCompare(b.code || '', 'ru', {numeric:true}));
      fp.innerHTML = '<option value="">Все аккаунты</option>' + ps.map(p => `<option value="${p.id}">${escapeHtml(profileLabel(p))}</option>`).join('');
    }

    function fillModalSelects(preProfile = '', preMentor = '') {
      const ps = (Store.state.profiles || []).slice().sort((a,b) => (a.code || '').localeCompare(b.code || '', 'ru', {numeric:true}));
      const ms = (Store.state.mentors || []).slice().sort((a,b) => (a.code || '').localeCompare(b.code || '', 'ru', {numeric:true}));
      document.getElementById('mProfile').innerHTML = '<option value="">— выбрать аккаунт —</option>' + ps.map(p => `<option value="${p.id}" ${p.id===preProfile?'selected':''}>${escapeHtml(profileLabel(p))}</option>`).join('');
      document.getElementById('mMentor').innerHTML = '<option value="">— выбрать клиента —</option>' + ms.map(m => `<option value="${m.id}" ${m.id===preMentor?'selected':''}>${escapeHtml(mentorLabel(m))}</option>`).join('');
      document.getElementById('mStatus').innerHTML = PROFILE_STATUSES.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
    }

    function statusBadge(s) {
      // Цвет по эмодзи: 🎯/🏆 = зелёный, ⭐ = оранжевый, ✅ = зелёный, иначе серый
      let cls = 'badge--gray';
      if (s && (s.includes('🎯') || s.includes('🏆') || s.includes('✅'))) cls = 'badge--green';
      else if (s && (s.includes('⭐') || s.includes('💬'))) cls = 'badge--orange';
      else if (s && s.includes('📋')) cls = 'badge--gray';
      return `<span class="badge ${cls}">${escapeHtml(s || '—')}</span>`;
    }

    function renderKpis() {
      const list = Store.state.profileStatuses || [];
      const counts = {};
      PROFILE_STATUSES.forEach(s => counts[s] = 0);
      list.forEach(r => { if (counts[r.status] != null) counts[r.status]++; });
      // top-4
      const items = PROFILE_STATUSES.map(s => `
        <div class="card">
          <div class="card__label">${escapeHtml(s)}</div>
          <div class="card__value">${counts[s] || 0}</div>
        </div>
      `).join('');
      document.getElementById('stKpis').innerHTML = items;
    }

    function render() {
      renderKpis();
      const list = (Store.state.profileStatuses || []).slice().sort((a,b) => (b.date || '').localeCompare(a.date || ''));
      const filtered = list.filter(r => {
        if (filters.status && r.status !== filters.status) return false;
        if (filters.mentorId && r.mentorId !== filters.mentorId) return false;
        if (filters.profileId && r.profileId !== filters.profileId) return false;
        if (filters.q) {
          const m = mentorById(r.mentorId), p = profileById(r.profileId);
          const s = `${m ? m.code+' '+m.name : ''} ${p ? p.code+' '+p.city : ''} ${r.comment || ''}`.toLowerCase();
          if (!s.includes(filters.q)) return false;
        }
        return true;
      });

      const tb = document.getElementById('stRows');
      if (filtered.length === 0) {
        tb.innerHTML = `<tr><td colspan="7" class="empty">Записей нет.</td></tr>`;
        return;
      }
      tb.innerHTML = filtered.map(r => {
        const p = profileById(r.profileId), m = mentorById(r.mentorId);
        const histLen = (r.history || []).length;
        return `<tr data-id="${r.id}">
          <td>${p ? '<span class="badge badge--orange">' + escapeHtml(p.code) + '</span> <span style="color:var(--text-mute);font-size:12px">' + escapeHtml(p.city || '') + '</span>' : '—'}</td>
          <td>${m ? '<strong>' + escapeHtml(mentorLabel(m)) + '</strong>' : '—'}</td>
          <td>${statusBadge(r.status)}</td>
          <td>${escapeHtml(fmtDate(r.date))}</td>
          <td style="font-size:12px;color:var(--text-dim)">${escapeHtml(r.comment || '')}</td>
          <td class="num">${histLen > 0 ? '<button class="btn btn--ghost btn--sm" data-act="hist" data-id="'+r.id+'">'+histLen+'</button>' : '0'}</td>
          <td class="actions">
            <button class="btn btn--ghost btn--sm" data-act="edit" data-id="${r.id}">Изменить</button>
            <button class="btn--icon" data-act="del" data-id="${r.id}" title="Удалить">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </td>
        </tr>`;
      }).join('');

      tb.querySelectorAll('[data-act="edit"]').forEach(b => b.addEventListener('click', () => openEdit(b.dataset.id)));
      tb.querySelectorAll('[data-act="del"]').forEach(b => b.addEventListener('click', () => {
        if (!confirmDelete('Удалить запись статуса?')) return;
        Store.deleteProfileStatus(b.dataset.id);
        render();
      }));
      tb.querySelectorAll('[data-act="hist"]').forEach(b => b.addEventListener('click', () => openHist(b.dataset.id)));
    }

    /* ---- модалка add/edit ---- */
    function openAdd() {
      document.getElementById('modalTitle').textContent = 'Поставить статус';
      fillModalSelects();
      document.getElementById('mComment').value = '';
      Modal.open('addModal');
    }
    function openEdit(id) {
      const rec = (Store.state.profileStatuses || []).find(s => s.id === id);
      if (!rec) return;
      document.getElementById('modalTitle').textContent = 'Изменить статус';
      fillModalSelects(rec.profileId, rec.mentorId);
      document.getElementById('mStatus').value = rec.status;
      document.getElementById('mComment').value = rec.comment || '';
      Modal.open('addModal');
    }
    document.getElementById('btnAdd').addEventListener('click', openAdd);
    document.getElementById('mSave').addEventListener('click', () => {
      const profileId = document.getElementById('mProfile').value;
      const mentorId  = document.getElementById('mMentor').value;
      const status    = document.getElementById('mStatus').value;
      const comment   = document.getElementById('mComment').value.trim();
      if (!profileId || !mentorId) { toast('Выберите аккаунт и клиента', 'error'); return; }
      if (!status) { toast('Выберите статус', 'error'); return; }
      Store.setProfileStatus(mentorId, profileId, status, comment);
      Modal.close('addModal');
      toast('Статус сохранён');
      render();
    });

    /* ---- модалка истории ---- */
    function openHist(id) {
      const rec = (Store.state.profileStatuses || []).find(s => s.id === id);
      if (!rec) return;
      const m = mentorById(rec.mentorId), p = profileById(rec.profileId);
      document.getElementById('histTitle').textContent =
        `История · ${p ? p.code : '?'} × ${m ? m.code : '?'}`;
      const items = (rec.history || []).slice().reverse().map(h => `
        <div style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            ${statusBadge(h.status)}
            <span style="font-size:12px;color:var(--text-mute)">${escapeHtml(fmtDate(h.date))}</span>
          </div>
          ${h.comment ? `<div style="font-size:12px;color:var(--text-dim);margin-top:4px">${escapeHtml(h.comment)}</div>` : ''}
        </div>
      `).join('') || '<div class="empty">История пуста</div>';
      const current = `
        <div style="padding:10px 12px;border:1px solid var(--accent);border-radius:8px;margin-bottom:14px;background:var(--accent-soft)">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            ${statusBadge(rec.status)}
            <span style="font-size:12px;color:var(--text-mute)">сейчас · ${escapeHtml(fmtDate(rec.date))}</span>
          </div>
          ${rec.comment ? `<div style="font-size:12px;color:var(--text-dim);margin-top:4px">${escapeHtml(rec.comment)}</div>` : ''}
        </div>`;
      document.getElementById('histBody').innerHTML = current + items;
      Modal.open('histModal');
    }

    /* ---- фильтры ---- */
    document.getElementById('fStatus').addEventListener('change', e => { filters.status = e.target.value; render(); });
    document.getElementById('fMentor').addEventListener('change', e => { filters.mentorId = e.target.value; render(); });
    document.getElementById('fProfile').addEventListener('change', e => { filters.profileId = e.target.value; render(); });
    document.getElementById('fSearch').addEventListener('input', e => { filters.q = e.target.value.trim().toLowerCase(); render(); });
    document.getElementById('btnReset').addEventListener('click', () => {
      filters.status = filters.mentorId = filters.profileId = filters.q = '';
      ['fStatus','fMentor','fProfile','fSearch'].forEach(id => document.getElementById(id).value = '');
      render();
    });
    window.onGlobalSearch = q => { filters.q = q; document.getElementById('fSearch').value = q; render(); };

    fillSelects();
    render();

    window.addEventListener('cloudstate:updated', () => { fillSelects(); render(); });
    window.addEventListener('store:reloaded', render);
  });

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  </script>
</body>
</html>
