<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Mentori CRM — вход</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="pages/client/client.css"/>
</head>
<body class="cli-body">
  <main class="cli-login" id="loginScreen" hidden>
    <div class="cli-login__card">
      <div class="cli-login__hero">
        <img src="assets/logo.png" alt="Mentori"
             class="cli-login__logo"
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
        <div class="cli-login__hero-fallback" style="display:none">Mentori</div>
        <div class="cli-login__hero-sub">Войдите в личный кабинет</div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" class="input" autocomplete="username" placeholder="вы@example.com"/>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" type="password" class="input" autocomplete="current-password" placeholder="••••••••"/>
      </div>

      <button id="btnLogin" class="btn btn--primary cli-login__btn"><span>Войти</span></button>
      <div id="err" class="cli-login__err" hidden></div>
    </div>
  </main>

  <p id="loadingMsg" style="padding:30px;color:#a0a0a0;font-family:system-ui">
    Проверяем сессию…
  </p>

  <script src="js/supabase-client.js?v=20260428b"></script>
  <script>
  /* ==========================================================================
     Универсальный экран входа (главная страница).
     • Если уже залогинен — редирект по роли:
         owner  → /pages/dashboard.html
         team   → /pages/statuses.html
         client → /pages/client/index.html
     • Если нет — показываем форму логина прямо тут.
     После успешного входа — тот же роутер по роли.
     ========================================================================== */
  (async () => {
    const { Auth } = window.Supabase;

    function landingFor(role) {
      if (role === 'client') return 'pages/client/index.html';
      if (role === 'team')   return 'pages/statuses.html';
      return 'pages/dashboard.html';   // owner и всё остальное — админка
    }

    // Авто-редирект если уже залогинен
    async function tryAutoRedirect() {
      if (!Auth.isLogged()) {
        try { await Auth.refresh(); } catch (_) {}
      }
      if (Auth.isLogged()) {
        location.replace(landingFor(Auth.role()));
        return true;
      }
      return false;
    }

    if (await tryAutoRedirect()) return;

    // Сессии нет — показываем форму логина
    document.getElementById('loadingMsg').remove();
    const screen = document.getElementById('loginScreen');
    screen.hidden = false;

    const err = document.getElementById('err');
    function showErr(msg) { err.textContent = msg; err.hidden = false; }

    async function submit() {
      err.hidden = true;
      const email = document.getElementById('email').value.trim().toLowerCase();
      const pwd   = document.getElementById('password').value;
      if (!email || !pwd) return showErr('Введите email и пароль');

      const btn = document.getElementById('btnLogin');
      btn.disabled = true; btn.textContent = 'Входим…';
      try {
        await Auth.signIn(email, pwd);
        location.replace(landingFor(Auth.role()));
      } catch (e) {
        showErr(e.message || 'Не удалось войти');
        btn.disabled = false; btn.textContent = 'Войти';
      }
    }

    document.getElementById('btnLogin').addEventListener('click', submit);
    ['email','password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') submit();
      });
    });
  })();
  </script>
</body>
</html>
