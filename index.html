<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Mentori CRM</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <p style="padding:30px;color:#a0a0a0;font-family:system-ui">
    Загрузка…
  </p>

  <script src="js/supabase-client.js"></script>
  <script>
  (async () => {
    const { Auth } = window.Supabase;
    if (!Auth.isLogged()) { try { await Auth.refresh(); } catch (_) {} }
    if (!Auth.isLogged()) {
      location.replace('pages/employee/login.html');
      return;
    }
    const role = Auth.role();
    location.replace(role === 'team' ? 'pages/statuses.html' : 'pages/dashboard.html');
  })();
  </script>
</body>
</html>
